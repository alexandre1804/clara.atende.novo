server {
    listen 80;
    server_name lorvix.com.br www.lorvix.com.br;

    root /root/clara.atende.novo;

    # Redirect www to non-www
    if ($host = www.lorvix.com.br) {
        return 301 https://lorvix.com.br$request_uri;
    }

    location = / {
        try_files /lorvix.html =404;
    }

    location = /linktree {
        try_files /linktree.html =404;
    }

    location = /briefing {
        try_files /briefing.html =404;
    }

    location = /briefing-agente {
        try_files /briefing-agente.html =404;
    }

    location = /briefing-contrato {
        try_files /briefing-contrato.html =404;
    }

    location = /ebook {
        try_files /ebook.html =404;
    }

    location /demo/bellezaprime {
        try_files /demo/bellezaprime/index.html =404;
    }

    location /images/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /demo/bellezaprime/uploads/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
    }
}
